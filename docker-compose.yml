version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mercari-hunter-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mercari
      POSTGRES_USER: mercari
      POSTGRES_PASSWORD: mercari
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mercari -d mercari"]
      interval: 10s
      timeout: 5s
      retries: 5

  mercari-hunter:
    build: .
    container_name: mercari-bargain-hunter
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_HOST: "postgres"
      DATABASE_PORT: "5432"
      DATABASE_DBNAME: "mercari"
      DATABASE_USER: "mercari"
      DATABASE_PASSWORD: "mercari"
    volumes:
      - ./logs:/app/logs
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "main.py"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
