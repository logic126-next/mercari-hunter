version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mercari-hunter-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: mercari_hunter
      POSTGRES_USER: mercari_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-mercari_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mercari_user -d mercari_hunter"]
      interval: 10s
      timeout: 5s
      retries: 5

  mercari-hunter:
    build: .
    container_name: mercari-bargain-hunter
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_HOST: "postgres"
      DATABASE_PORT: "5432"
      DATABASE_DBNAME: "mercari_hunter"
      DATABASE_USER: "mercari_user"
      DATABASE_PASSWORD: ${DB_PASSWORD:-mercari_password}
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "pgrep", "-f", "main.py"]
      interval: 60s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
